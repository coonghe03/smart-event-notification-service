name: Build and Push to AWS ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  AWS_REGION: ${{ secrets.AWS_REGION }} # ap-southeast-1
  ECR_REPOSITORY: smart-event-notification # Change if you named it differently
  IMAGE_TAG: ${{ github.sha }} # Unique tag per commit (or use :latest)

jobs:
  build-and-push:
    name: Build, tag, and push image to Amazon ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required if you switch to OIDC later
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          # Build Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          # Tag as 'latest' too (optional but useful for demo)
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Push both tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Image digest (for logging)
        run: |
          echo "Pushed image digest:"
          docker images --digests $ECR_REGISTRY/$ECR_REPOSITORY
