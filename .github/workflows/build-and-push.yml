name: Build and Push to AWS ECR with SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: smart-event-notification

jobs:
  # ====================== SONARCLOUD SCAN JOB ======================
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarCloud to analyze full history

      - name: Install dependencies
        run: npm ci # Faster and more reliable than npm install

      - name: Run tests (if any)
        run: npm test || echo "No tests found - skipping"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.organization=bavi2002
            -Dsonar.projectKey=Bavi2002_smart-event-notification-service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ====================== BUILD & DEPLOY JOB ======================
  build-and-push:
    name: Build, tag, and push image to Amazon ECR
    runs-on: ubuntu-latest
    needs: sonarcloud # Only run if SonarCloud succeeds
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Build the image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .

          # Also tag as latest (useful for demo)
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Push both tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Image digest (for logging)
        run: |
          echo "Pushed image digest:"
          docker images --digests ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster smart-event-cluster \
            --service notification-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
