version: "3.9"

services:
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - MONGO_URI=mongodb://mongodb:27017/smart_event
      - JWT_SECRET=super-secret-jwt-key-for-group-2026-change-this
      - RESEND_API_KEY=${RESEND_API_KEY}
      - USER_SERVICE_URL=http://user-service:3001 # will be container name later
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongodb
    command: npm run dev # uses nodemon for hot-reload

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=smart_event

volumes:
  mongo-data:
